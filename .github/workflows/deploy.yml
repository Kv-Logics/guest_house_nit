name: Deploy to RHEL (rooms.nitt.edu)

on:
  push:
    branches:
      - main          # Deploy on every push to main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: self-hosted   # The GitHub runner registered on the RHEL server

    steps:
      - name: Checkout code (Bypass Node.js)
        run: |
          git init
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Kv-Logics/guest_house_nit.git || git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Kv-Logics/guest_house_nit.git
          git fetch origin main
          git reset --hard FETCH_HEAD

      # The .env file lives in the FTP root one level above the project folder.
      # FileZilla uploads it to: /www/wwwroot/rooms.nitt.edu/.env
      # The project code is at:  /www/wwwroot/rooms.nitt.edu/guesthouse/
      # This step copies it into the project root so docker-compose can read it.
      - name: Copy .env from FTP root
        run: cp /www/wwwroot/rooms.nitt.edu/.env .env

      - name: Build and start containers
        run: docker compose up --build -d

      - name: Remove unused Docker images (keep disk clean)
        run: docker image prune -f
