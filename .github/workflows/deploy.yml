name: Deploy to RHEL (rooms.nitt.edu)

on:
  push:
    branches:
      - main          # Deploy on every push to main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: self-hosted   # The GitHub runner registered on the RHEL server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # The .env.production file lives in the FTP root one level above the project folder.
      # FileZilla uploads it to: /var/www/rooms.nitt.edu/.env.production
      # The project code is at:  /var/www/rooms.nitt.edu/guesthouse/
      # This step copies it into the project root so docker-compose can read it.
      - name: Copy .env.production from FTP root
        run: cp /var/www/rooms.nitt.edu/.env.production .env.production

      - name: Build and start containers
        run: docker compose --env-file .env.production up --build -d

      - name: Remove unused Docker images (keep disk clean)
        run: docker image prune -f
