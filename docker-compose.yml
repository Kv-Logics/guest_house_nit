version: '3.8'

services:

  # ─────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: gh-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "45432:5432"          # Random host port — change if 45432 is taken on RHEL
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Redis Cache / OTP Store
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: gh-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Node.js Backend (Express API)
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gh-backend
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      - uploads:/app/uploads    # Named volume so uploads persist across deployments
      - logs:/app/logs          # Named volume so application logs persist across deployments
      - ./Data_Of_Users:/app/Data_Of_Users:ro
      - ./Data_Of_Rooms:/app/Data_Of_Rooms:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    # backend is NOT exposed to host directly — all traffic goes through nginx

  # ─────────────────────────────────────────
  # Nginx + React Frontend
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Vite bakes this at build time — must be a relative path so the
        # browser uses nginx's proxy, not a direct container address
        VITE_API_URL: /api
        VITE_ENABLE_AUTOFILL: "false"
        VITE_ENABLE_TIME_MACHINE: "false"
    container_name: gh-frontend
    ports:
      - "9006:80"               # The only host-exposed port — reverse proxy targets this
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  uploads:
    driver: local
  logs:
    driver: local
