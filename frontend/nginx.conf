server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Upload size limit (matches backend 5 MB multer limit) ────
    client_max_body_size 10M;

    # ── Proxy: API requests → Express backend ───────────────────
    # Browser requests /api/... → nginx forwards to backend:5000/api/...
    location /api/ {
        proxy_pass         http://backend:5000/api/;
        proxy_http_version 1.1;

        # Preserve original host and client IP for CORS and logging
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Forward cookies (required for HttpOnly JWT + CSRF cookies)
        proxy_set_header Cookie            $http_cookie;
        proxy_pass_header Set-Cookie;

        # Disable response buffering so SSE / streaming works
        proxy_buffering off;
    }

    # ── Proxy: Static uploads → Express backend ─────────────────
    # File previews (documents, payment proofs, invoices) are served
    # by Express's express.static('/uploads'). Browser hits /uploads/...
    # and nginx proxies to backend:5000/uploads/...
    location /uploads/ {
        proxy_pass         http://backend:5000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── SPA fallback ─────────────────────────────────────────────
    # All other paths served as the React SPA (react-router handles routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache static assets ──────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Security headers (supplement to backend helmet) ──────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
}
